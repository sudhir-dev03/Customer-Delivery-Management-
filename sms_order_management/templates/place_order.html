<!DOCTYPE html>
<html>

<head>

<title>Place Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="container mt-5">

<h1>Place New Order</h1>

<form id="orderForm">

    <label>Phone Number</label>

    <input
        type="text"
        id="phone"
        class="form-control">

    <br>

    <label>Product</label>

    <input
        type="text"
        id="product"
        class="form-control">

    <br>

    <label>Quantity</label>

    <input
        type="number"
        id="quantity"
        class="form-control">

    <br>

    <button
        type="submit"
        class="btn btn-success">

        Place Order

    </button>

</form>

<br>

<div id="result"></div>

<script>

document
.getElementById("orderForm")
.addEventListener(
    "submit",
    async function(e){

        e.preventDefault();

        let response =
        await fetch(
            "/create-order",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    phone:
                    document.getElementById(
                        "phone"
                    ).value,

                    product:
                    document.getElementById(
                        "product"
                    ).value,

                    quantity:
                    document.getElementById(
                        "quantity"
                    ).value

                })
            }
        );

        let data =
        await response.json();

        document.getElementById(
            "result"
        ).innerHTML =

        `<div class="alert alert-success">

        Order Created Successfully

        <br>

        Order ID:
        ${data.order_id}

        </div>`;
    }
);

</script>

</body>
</html>
