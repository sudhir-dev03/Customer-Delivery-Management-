<!DOCTYPE html>
<html>

<head>
<title>Assign Driver</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="container mt-5">

<h1>Assign Driver</h1>

<form action="/assign-driver-ui" method="POST">

    <input
        type="hidden"
        name="order_id"
        value="{{ order_id }}">

    <label>Driver Name</label>

    <input
        type="text"
        name="driver_name"
        class="form-control">

    <br>

    <button
        class="btn btn-primary">

        Assign

    </button>

</form>

</body>
</html>
