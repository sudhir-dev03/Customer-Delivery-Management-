<!DOCTYPE html>
<html>
<head>
    <title>Seafood Delivery Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-4">

    <h1 class="text-center mb-4">
        Seafood Order Management System
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h3>Total Orders</h3>
                    <h1>{{ total_orders }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h3>Pending Orders</h3>
                    <h1>{{ pending_orders }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h3>Delivered Orders</h3>
                    <h1>{{ delivered_orders }}</h1>
                </div>
            </div>
        </div>

    </div>
    <div class="col-md-3">
    <div class="card text-center shadow">
        <div class="card-body">
            <h3>Assigned Orders</h3>
            <h1>{{ assigned_orders }}</h1>
        </div>
    </div>
</div>
<a href="/orders" class="btn btn-primary">
    View All Orders
</a>

<a href="/place-order" class="btn btn-success">
    Place Order
</a>

<a href="/search" class="btn btn-warning">
    Track Order
</a>

</body>
</html>
